name: Aesthitix Auto-Post Agent

on:
  # Allows you to trigger it manually or via a Telegram webhook call
  repository_dispatch:
    types: [trigger_agent]
  workflow_dispatch:
    inputs:
      image_url:
        description: 'URL of the viral image'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-with-dependencies: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install requests

      - name: Run Agent Automation Script
        env:
          TARGET_IMAGE_URL: ${{ github.event.client_payload.image_url || github.event.inputs.image_url }}
        run: python run_agent.py

      - name: Commit and Push Changes to Main
        run: |
          git config --global user.name "Aesthitix-Agent"
          git config --global user.email "agent@aesthitix.com"
          git add data.json
          git commit -m "Auto-added new generated prompt banner" || exit 0
          git push origin main
          

    <script>
        // Load saved prompt and image immediately when page opens
        var savedPrompt = localStorage.getItem('tempPrompt') || 'No prompt selected.';
        var savedImage  = localStorage.getItem('tempImage');

        var promptImage     = document.getElementById('prompt-image');
        var finalPrompt     = document.getElementById('final-prompt');
        var promptContainer = document.getElementById('prompt-container');
        var adBtn           = document.getElementById('ad-trigger');
        var copyBtn         = document.getElementById('copy-btn');

        // Set the image right away
        if (savedImage && promptImage) {
            promptImage.src = savedImage;
        }

        // Set the prompt text right away (hidden until ad clicked)
        finalPrompt.innerText = savedPrompt;

        // Ad button click
        adBtn.addEventListener('click', function() {
            adBtn.innerText = 'LOADING SECURE AD...';
            adBtn.style.opacity = '0.5';
            adBtn.disabled = true;

            setTimeout(function() {
                alert('Success! Prompt Unlocked.');
                adBtn.style.display = 'none';
                promptContainer.style.display = 'block';
                copyBtn.style.display = 'block';
            }, 3000);
        });

        // Copy button click — reads directly from localStorage to get full prompt
        copyBtn.addEventListener('click', function() {
            var fullPrompt = localStorage.getItem('tempPrompt') || finalPrompt.innerText;
            navigator.clipboard.writeText(fullPrompt.trim()).then(function() {
                copyBtn.innerText = 'PROMPT COPIED! ✓';
                copyBtn.style.boxShadow = '0 0 30px rgba(34, 197, 94, 0.6)';
                copyBtn.style.transform = 'scale(1.05)';
                setTimeout(function() {
                    copyBtn.style.boxShadow = 'none';
                    copyBtn.style.transform = 'scale(1)';
                    copyBtn.innerText = 'COPY AGAIN';
                }, 2000);
            }).catch(function() {
                // Fallback for browsers that block clipboard
                var ta = document.createElement('textarea');
                ta.value = fullPrompt.trim();
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                copyBtn.innerText = 'PROMPT COPIED! ✓';
                setTimeout(function() { copyBtn.innerText = 'COPY AGAIN'; }, 2000);
            });
        });
    </script>
